name: todo_desktop
description: A Windows desktop Todo List application with system tray and reminders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # System tray
  system_tray: ^2.0.3
  # Window management
  window_manager: ^0.4.3
  # Windows Toast Notifications
  win_toast: ^0.1.0
  # UUID generation
  uuid: ^3.0.7
  # Date formatting
  intl: ^0.19.0
  # Path provider
  path_provider: ^2.1.5
  # DateTime picker
  omni_datetime_picker: 2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
